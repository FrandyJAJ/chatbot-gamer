<div class="registro-container">

  <div class="registro-card">

    <div class="logo">🎮</div>

    <h1>Crear Cuenta</h1>

    <p class="subtitulo">
      Regístrate para usar GameBot
    </p>

    <form (ngSubmit)="registrar()">

      <div class="campo">
        <label for="nombre">Nombre</label>

        <input
          id="nombre"
          type="text"
          name="nombre"
          [(ngModel)]="nombre"
          placeholder="Ingrese su nombre"
          required
        />
      </div>

      <div class="campo">
        <label for="correo">Correo</label>

        <input
          id="correo"
          type="email"
          name="correo"
          [(ngModel)]="correo"
          placeholder="ejemplo@correo.com"
          required
        />
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>

        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Mínimo 6 caracteres"
          required
        />
      </div>

      <div class="campo">
        <label for="confirmarPassword">
          Confirmar contraseña
        </label>

        <input
          id="confirmarPassword"
          type="password"
          name="confirmarPassword"
          [(ngModel)]="confirmarPassword"
          placeholder="Repita su contraseña"
          required
        />
      </div>

      <p
        *ngIf="mensajeError"
        class="mensaje-error"
      >
        {{ mensajeError }}
      </p>

      <p
        *ngIf="mensajeExito"
        class="mensaje-exito"
      >
        {{ mensajeExito }}
      </p>

      <button
        class="boton"
        type="submit"
        [disabled]="cargando"
      >
        {{ cargando ? 'Registrando...' : 'Registrarse' }}
      </button>

    </form>

    <div class="login-link">
      ¿Ya tienes una cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </div>

  </div>

</div>
