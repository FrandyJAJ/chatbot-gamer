<div class="registro-container">

    <div class="registro-card">

        <div class="logo">🎮</div>

        <h1>Crear Cuenta</h1>

        <p class="subtitulo">
            Regístrate para usar GameBot
        </p>

        <div class="campo">
            <label>Nombre</label>
            <input type="text">
        </div>

        <div class="campo">
            <label>Correo</label>
            <input type="email">
        </div>

        <div class="campo">
            <label>Contraseña</label>
            <input type="password">
        </div>

        <button class="boton">
            Registrarse
        </button>

        <div class="login-link">
            ¿Ya tienes una cuenta?
            <a routerLink="/login">Inicia sesión</a>
        </div>

    </div>

</div>
