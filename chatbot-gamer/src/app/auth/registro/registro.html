<div class="registro-container">

    <div class="registro-card">

        <div class="logo">🎮</div>

        <h1>Crear Cuenta</h1>

        <p class="subtitulo">
            Regístrate para usar GameBot
        </p>

        <div class="campo">
            <label>Nombre</label>
            <input type="text">
        </div>

        <div class="campo">
            <label>Correo</label>
            <input type="email">
        </div>

        <div class="campo">
            <label>Contraseña</label>
            <input type="password">
        </div>

        <div class="campo">
  <label for="confirmarPassword">
    Confirmar contraseña
  </label>

  <input
    id="confirmarPassword"
    type="password"
    name="confirmarPassword"
    [(ngModel)]="confirmarPassword"
    placeholder="Repita su contraseña"
    required
  />
</div>

<form (ngSubmit)="registrar()">

  <div class="campo">
    <label for="nombre">Nombre</label>
    <input
      id="nombre"
      type="text"
      name="nombre"
      [(ngModel)]="nombre"
      required
    />
  </div>

  <div class="campo">
    <label for="correo">Correo</label>
    <input
      id="correo"
      type="email"
      name="correo"
      [(ngModel)]="correo"
      required
    />
  </div>

  <div class="campo">
    <label for="password">Contraseña</label>
    <input
      id="password"
      type="password"
      name="password"
      [(ngModel)]="password"
      required
    />
  </div>

  <div class="campo">
    <label for="confirmarPassword">
      Confirmar contraseña
    </label>
    <input
      id="confirmarPassword"
      type="password"
      name="confirmarPassword"
      [(ngModel)]="confirmarPassword"
      required
    />
  </div>

  <p *ngIf="mensajeError" class="mensaje-error">
    {{ mensajeError }}
  </p>

  <p *ngIf="mensajeExito" class="mensaje-exito">
    {{ mensajeExito }}
  </p>

  <button
    type="submit"
    [disabled]="cargando"
  >
    {{ cargando ? 'Registrando...' : 'Registrarse' }}
  </button>

</form>

        <button class="boton">
            Registrarse
        </button>

        <div class="login-link">
            ¿Ya tienes una cuenta?
            <a routerLink="/login">Inicia sesión</a>
        </div>

    </div>

</div>
